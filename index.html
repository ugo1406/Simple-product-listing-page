
<!DOCTYPE html>
<html ng-app="productApp">

<head>
    <title>Product Listing Page</title>

    <!-- AngularJS library -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial;
            padding: 0px;
            font-family:"Special elite";
            color: #548eb5;
            transition: 0.3s;
        }

        .product {
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            padding: 10px;
            margin: 10px;
        }
        .product:hover{
            transform: scale(0.9);  
            transition: 0.4s;
        }

        input {
            padding: 8px;
            width: 200px;
            margin-bottom: 10px;
        }

        /* body {
            background-color: white;
            color: black;
            transition: 0.3s;
        } */

        /* dark mode */
        .dark {
            background-color: #121212;
            color: #286994;
        }
        #dropdown{
            padding:8px 0;
        }
        #dropdown select{
            width: 50%;
            height: 2rem;
        }
        #dark-button{
            display: flex;
            justify-content: flex-end;
        }
        #dark-button img{
            width: 10px;
            height: 10px;
        }
        #dark-button button{
width: 50px;
height: 50px;
        }
    
     button{
            border-radius: 15px;
            padding: 10px 8px;
            width: 8rem;
            background-color: 	#A7C7E7;
        }
        button:hover{
            background-color: #A7C5E0;
            color: aliceblue;
            transition: 0.4s;
        }
        #search-bar{
            display: flex;
            justify-content: center;
        }
        #search-bar input{
            width: 100%;
        }
        .page-head{
            display: flex;
            align-items: center;
            flex-direction: column;
           
            /* font-size: 100px; */
        }
        .page-head h1{
            font-size: 100px;
            
        }
        .form {
    width: 100%;
    margin:50px 50px;
        }
        .form input {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
            width: 50%;
        }
        #order-button {
    text-align: center;
}
#main-section{
    width: 1000px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    margin: 50px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);

}
#main-section h1{
    text-align: center;
    padding: 30px 20px;
}
    
.footer {
    background: #548eb5;
    color: #fff;
    text-align: center;
    padding: 25px 15px;
    margin-top: 40px;
}

.footer-content h3 {
    margin-bottom: 10px;
}

.footer-links {
    margin: 10px 0;
}

.footer-links a {
    color: #ccc;
    margin: 0 10px;
    text-decoration: none;
}

.footer-links a:hover {
    color: #fff;
}

.copyright {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
}

#order-quantity {
    margin: 10px 0;
    display: flex;
    justify-content: center;
}

#order-quantity input {
    width: 150px;
    padding: 8px;
    text-align: center;
    border-radius: 10px;
    border: 1px solid #ccc;
}

#order-button {
    text-align: center;
    margin-top: 20px;
}

    </style>
</head>

<body ng-controller="ProductController" ng-class="{'dark': isDarkMode}">

  <header id="dark-button" > <button ng-click="toggleDarkMode()">
       <img src="night-mode.png">
    </button></header>

    <div class="page-head"><h1>Shoppy</h1>
       <p>Your one stop shop.</p>
    </div>
<div id="order-button">
    <div id="dropdown">
        <select ng-model="selectProduct"
            ng-options="product as (product.name + ': ' + product.quantity) for product in products">
        </select>
    </div>

    <div id="order-quantity">
        <input type="number" ng-model="orderQty" placeholder="Enter quantity" min="1">
    </div>

    <button ng-click="placeOrder()">Place an Order</button>
</div>
<section id="main-section">
    <h1>🛍️ Products</h1>

   <div id="search-bar"> <input type="text" ng-model="searchText" placeholder="Search products..."></div>
    <div class="product" ng-repeat="item in products  |  filter:searchText">
        <h3>{{ item.name }}</h3>
        <p>Price: ₦{{ item.price }}</p>
        <p>Category: {{ item.category }}</p>
        <p>Quantity: {{item.quantity}}</p>
    </div></section>

    <form class="form">
    <h1>🛍️ Add Product</h1>
    <input type="text" ng-model="product.name" placeholder="Name">
    <input type="number" ng-model="product.price" placeholder="Price">
    <input type="text" ng-model="product.category" placeholder="Category">
    <input type="number" ng-model="product.quantity" placeholder="Quantity">
    <button ng-click="addProduct()">
        Add Product
    </button></form>
<footer class="footer">
    <div class="footer-content">
        <h3>Shoppy</h3>
        <p>Quality products at affordable prices.</p>

        <div class="footer-links">
            <a href="#">Home</a>
            <a href="#main-section">Products</a>
        </div>

        <p class="copyright">© 2026 Shoppy. All Rights Reserved.</p>
    </div>
</footer>
</body>
<script>

    var app = angular.module("productApp", []);


    app.controller("ProductController", function ($scope) {
        $scope.product = { name: "", price: "", category: "", quantity: ""},
            $scope.isDarkMode = false; // default is light mode
            $scope.orderQty = 1;

        $scope.products = [
            { name: "Laptop", price: 250000, category: "Electronics", quantity: "10" },
            { name: "Phone", price: 150000, category: "Electronics", quantity: "50" },
            { name: "Shoes", price: 20000, category: "Fashion", quantity: "100" },
            { name: "Bag", price: 12000, category: "Fashion", quantity: "40" },
            { name: "Headphones", price: 30000, category: "Accessories", quantity: "25" }
        ];

        $scope.toggleDarkMode = function () {
            $scope.isDarkMode = !$scope.isDarkMode;
        };

        $scope.addProduct = function () {
            $scope.products.unshift($scope.product)
            // $scope.products.push($scope.product)
            $scope.product = { name: "", price: "", category: "", quantity:"" }
        };

        $scope.removeProduct = function () {
            if ($scope.selectProduct.quantity > 0) {
                $scope.selectProduct.quantity--;
            }
            else { $scope.selectProduct.quantity == 0 }

        };
        

$scope.placeOrder = function () {
    if (!$scope.selectProduct) {
        alert("Please select a product");
        return;
    }

    if (!$scope.orderQty || $scope.orderQty <= 0) {
        alert("Enter a valid quantity");
        return;
    }

    if ($scope.orderQty > $scope.selectProduct.quantity) {
        alert("Not enough stock available!");
        return;
    }

    $scope.selectProduct.quantity -= $scope.orderQty;

    // alert("Order placed successfully!");

   
    $scope.orderQty = 1;
};

        $scope.searchText = "";

    });
</script>

</html>
