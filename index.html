<!DOCTYPE html>
<html ng-app="productApp">

<head>
  <title>Product Listing Page</title>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
  <script src="page.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Special+Elite&display=swap"
    rel="stylesheet">
  <link href="page.css" rel="stylesheet">
</head>

<body ng-controller="ProductController" ng-class="{'dark': isDarkMode}">




  <header id="dark-button"><a href="#!/home">Home</a>
    <a href="#!/add">Add Product</a>

    <div id="cart-icon" ng-click="cartOpen = !cartOpen">Cart<i class="fa-solid fa-cart-shopping"></i></div>
    <button ng-click="toggleDarkMode()">
      <img src="night-mode.png">
    </button>
  </header>

  <div id="cart-design" ng-show="cartOpen">

    <button ng-click="cartOpen = false"> Close</button>
    <h2>Your Cart</h2>

    <div ng-repeat="item in cart">
      <p>{{ item.name }} </p>
      <p>Qty: {{ item.qty }}</p>
      <p> ₦{{ item.price * item.qty }}</p>
    </div>
    <hr>
    <p><strong>Total: ₦{{ cartTotal() }}</strong></p>
  </div>



  <div ng-view></div>



  <footer class="footer">
    <div class="footer-content">
      <h3>Shoppy</h3>
      <p>Quality products at affordable prices.</p>
      <div class="footer-links">
        <a href="#">Home</a>
        <a href="#main-section">Products</a>
      </div>
      <p class="copyright">© 2026 Shoppy. All Rights Reserved.</p>
    </div>
  </footer>

</body>

</html>
