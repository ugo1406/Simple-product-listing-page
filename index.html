<!DOCTYPE html>
<html ng-app="productApp">
<head>
    <title>Product Listing Page</title>

    <!-- AngularJS library -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .product {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
        }

        input {
            padding: 8px;
            width: 200px;
            margin-bottom: 10px;
        }

        body {
    background-color: white;
    color: black;
    transition: 0.3s;
         }

/* dark mode */
.dark {
    background-color: #121212;
    color: white;
}
button{
    border-radius: 5px;
    padding: 5px 5px;
}
    </style>
</head>

<body ng-controller="ProductController" ng-class="{'dark': isDarkMode}">

    <button ng-click="toggleDarkMode()">
  Dark Mode
</button>

    <h1>🛍️ Product Listing Page</h1>

    <input type="text" ng-model="searchText" placeholder="Search products...">

    <div class="product" ng-repeat="item in products | filter:searchText">

       
        <h3>{{ item.name }}</h3>

       
        <p>Price: ₦{{ item.price }}</p>

       
        <p>Category: {{ item.category }}</p>

    </div>

    <script>
        
        var app = angular.module("productApp", []);

        
        app.controller("ProductController", function($scope) {
            $scope.isDarkMode = false; // default is light mode

$scope.toggleDarkMode = function() {
    $scope.isDarkMode = !$scope.isDarkMode;
};

            
            $scope.products = [
                { name: "Laptop", price: 250000, category: "Electronics" },
                { name: "Phone", price: 150000, category: "Electronics" },
                { name: "Shoes", price: 20000, category: "Fashion" },
                { name: "Bag", price: 12000, category: "Fashion" },
                { name: "Headphones", price: 30000, category: "Accessories" }
            ];

            
            $scope.searchText = "";

        });
    </script>

</body>
</html>
