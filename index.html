<!DOCTYPE html>
<html ng-app="productApp">
<head>
    <title>Product Listing Page</title>

    <!-- AngularJS library -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        /* Simple styling */
        body {
            font-family: Arial;
            padding: 20px;
        }

        .product {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
        }

        input {
            padding: 8px;
            width: 200px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body ng-controller="ProductController">

    <h1>🛍️ Product Listing Page</h1>

    <!-- SEARCH BOX -->
    <!-- ng-model links input to AngularJS -->
    <input type="text" ng-model="searchText" placeholder="Search products...">

    <!-- PRODUCT LIST -->
    <!-- ng-repeat loops through products array -->
    <!-- filter:searchText allows searching -->
    <div class="product" ng-repeat="item in products | filter:searchText">

        <!-- Product Name -->
        <h3>{{ item.name }}</h3>

        <!-- Product Price -->
        <p>Price: ₦{{ item.price }}</p>

        <!-- Product Category -->
        <p>Category: {{ item.category }}</p>

    </div>

    <script>
        // Create AngularJS app module
        var app = angular.module("productApp", []);

        // Create controller
        app.controller("ProductController", function($scope) {

            // Product data (array of objects)
            $scope.products = [
                { name: "Laptop", price: 250000, category: "Electronics" },
                { name: "Phone", price: 150000, category: "Electronics" },
                { name: "Shoes", price: 20000, category: "Fashion" },
                { name: "Bag", price: 12000, category: "Fashion" },
                { name: "Headphones", price: 30000, category: "Accessories" }
            ];

            // Search text (empty by default)
            $scope.searchText = "";

        });
    </script>

</body>
</html>
